<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Qué jugador de Free Fire eres?</title>
    <style>
        body {
            background-color: #121212; 
            color: #ffffff; 
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .contenedor {
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            color: #ff6600; 
            text-transform: uppercase;
            text-shadow: 2px 2px 8px rgba(255, 102, 0, 0.6);
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            color: #aaaaaa;
            margin-bottom: 30px;
        }

        /* --- ESTILO DEL BOTÓN --- */
        .boton-empezar {
            display: inline-block;
            background-color: #ff6600;
            color: white;
            text-decoration: none; /* Quita la línea de abajo del enlace */
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 5px;
            box-shadow: 0px 4px 15px rgba(255, 102, 0, 0.4);
            transition: 0.3s ease; /* Hace que el efecto al pasar el mouse sea suave */
        }

        /* Efecto cuando pasas el mouse por encima */
        .boton-empezar:hover {
            background-color: #e05500;
            transform: scale(1.05); /* Agranda el botón un poco */
            box-shadow: 0px 6px 20px rgba(255, 102, 0, 0.6);
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>¿Qué jugador de Free Fire eres?</h1>
        <p>Próximamente: ¡Descubre si eres un Pro Player, un Campero o el Rey del Rush!</p>
        
        <a href="juego.html" target="_blank" class="boton-empezar">Empezar</a>
    </div>

</body>
</html>
